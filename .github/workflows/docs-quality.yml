name: docs-quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docs-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run website docs checks
        run: bash scripts/check-doc-quality.sh

      - name: Build site
        run: npm run build
